name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: vehiclelookup-52da7
      VM_NAME: riven-app-vm
      VM_ZONE: africa-south1-a
      DEPLOY_USER: kelvinmbugua
      DEPLOY_PATH: /var/www/riven-prod
      PM2_NAME: riven-prod
      APP_PORT: "8080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/901371236366/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: riven-deploy@vehiclelookup-52da7.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install NumPy for faster gcloud IAP tunnel
        run: pip install numpy

      - name: Package release
        run: |
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.env' \
              --exclude='*.log' \
              --exclude='uploads' \
              --exclude='coverage' \
              --exclude='dist' \
              --exclude='.nyc_output' \
              -czf /tmp/deploy.tar.gz .
          echo "Tarball size: $(du -sh /tmp/deploy.tar.gz | cut -f1)"
          # base64-encode so the IAP tunnel doesn't corrupt binary data
          base64 /tmp/deploy.tar.gz > /tmp/deploy.tar.gz.b64
          echo "Base64 size:  $(du -sh /tmp/deploy.tar.gz.b64 | cut -f1)"
          printf '%s' "$PROD_ENV" > /tmp/deploy.env
          chmod 600 /tmp/deploy.env
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}

      - name: Build remote deploy script
        run: |
          cat > /tmp/remote-deploy.sh <<EOF
          #!/bin/bash
          set -e
          DEPLOY_PATH="${DEPLOY_PATH}"
          PM2_NAME="${PM2_NAME}"
          APP_PORT="${APP_PORT}"
          mkdir -p "\$DEPLOY_PATH"
          cd "\$DEPLOY_PATH"
          base64 -d /tmp/deploy.tar.gz.b64 > /tmp/deploy.tar.gz
          tar -xzf /tmp/deploy.tar.gz
          install -m 600 /tmp/deploy.env "\$DEPLOY_PATH/.env"
          npm ci --omit=dev
          npm run migrate
          pm2 delete "\$PM2_NAME" 2>/dev/null || true
          NODE_ENV=production PORT="\$APP_PORT" pm2 start src/server.js --name "\$PM2_NAME" -i 2
          pm2 save
          EOF
          chmod +x /tmp/remote-deploy.sh

      - name: Clean stale temp files from previous deploys
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --command="sudo rm -f /tmp/deploy.tar.gz /tmp/deploy.tar.gz.b64 /tmp/deploy.env /tmp/remote-deploy.sh" || true

      - name: Upload artifacts to VM
        run: |
          scp_upload() {
            local file="$1"
            for i in 1 2 3; do
              echo "Uploading $file (attempt $i)..."
              gcloud compute scp "$file" "$VM_NAME":/tmp/ \
                --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap && return 0
              echo "Attempt $i failed for $file"
              [ "$i" -lt 3 ] && sleep 15
            done
            echo "ERROR: Failed to upload $file after 3 attempts"
            return 1
          }
          scp_upload /tmp/deploy.tar.gz.b64
          scp_upload /tmp/deploy.env
          scp_upload /tmp/remote-deploy.sh

      - name: Verify artifacts on VM
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --command="ls -lh /tmp/deploy.tar.gz.b64 /tmp/deploy.env /tmp/remote-deploy.sh 2>&1; test -s /tmp/deploy.tar.gz.b64 && test -s /tmp/deploy.env && test -s /tmp/remote-deploy.sh && echo 'All artifacts present'"

      - name: Run deploy script as ${{ env.DEPLOY_USER }}
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --command="sudo install -m 600 -o $DEPLOY_USER -g $DEPLOY_USER /tmp/deploy.env /tmp/deploy.env.owned && sudo mv /tmp/deploy.env.owned /tmp/deploy.env && sudo -u $DEPLOY_USER bash /tmp/remote-deploy.sh; sudo rm -f /tmp/remote-deploy.sh /tmp/deploy.tar.gz /tmp/deploy.tar.gz.b64 /tmp/deploy.env; exit \$?"

      - name: Apply nginx config
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --command="sudo cp $DEPLOY_PATH/nginx-prod.conf /etc/nginx/sites-available/riven && sudo ln -sf /etc/nginx/sites-available/riven /etc/nginx/sites-enabled/riven && sudo rm -f /etc/nginx/sites-enabled/default && sudo nginx -t && sudo systemctl reload nginx && echo 'Nginx reloaded for api.rivenapp.com'"

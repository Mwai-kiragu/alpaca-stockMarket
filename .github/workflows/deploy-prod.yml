name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: vehiclelookup-52da7
      VM_NAME: riven-app-vm
      VM_ZONE: africa-south1-a
      DEPLOY_USER: kelvinmbugua
      DEPLOY_PATH: /var/www/riven-prod
      PM2_NAME: riven-prod
      APP_PORT: "8080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/901371236366/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: riven-deploy@vehiclelookup-52da7.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Package release
        run: |
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.env' \
              --exclude='*.log' \
              -czf /tmp/deploy.tar.gz .
          printf '%s' "$PROD_ENV" > /tmp/deploy.env
          chmod 600 /tmp/deploy.env
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}

      - name: Build remote deploy script
        run: |
          cat > /tmp/remote-deploy.sh <<EOF
          #!/bin/bash
          set -e
          DEPLOY_PATH="${DEPLOY_PATH}"
          PM2_NAME="${PM2_NAME}"
          APP_PORT="${APP_PORT}"
          mkdir -p "\$DEPLOY_PATH"
          cd "\$DEPLOY_PATH"
          tar -xzf /tmp/deploy.tar.gz
          install -m 600 /tmp/deploy.env "\$DEPLOY_PATH/.env"
          npm ci --omit=dev
          npm run migrate
          pm2 delete "\$PM2_NAME" 2>/dev/null || true
          NODE_ENV=production PORT="\$APP_PORT" pm2 start src/server.js --name "\$PM2_NAME" -i 2
          pm2 save
          EOF
          chmod +x /tmp/remote-deploy.sh

      - name: Clean stale temp files from previous deploys
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --command="sudo rm -f /tmp/deploy.tar.gz /tmp/deploy.env /tmp/remote-deploy.sh" || true

      - name: Upload artifacts to VM
        run: |
          gcloud compute scp /tmp/deploy.tar.gz /tmp/deploy.env /tmp/remote-deploy.sh \
            "$VM_NAME":/tmp/ \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap

      - name: Run deploy script as ${{ env.DEPLOY_USER }}
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --command="sudo install -m 600 -o $DEPLOY_USER -g $DEPLOY_USER /tmp/deploy.env /tmp/deploy.env.owned && sudo mv /tmp/deploy.env.owned /tmp/deploy.env && sudo -u $DEPLOY_USER bash /tmp/remote-deploy.sh; sudo rm -f /tmp/remote-deploy.sh /tmp/deploy.tar.gz /tmp/deploy.env; exit \$?"

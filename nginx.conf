# Riven Backend — Nginx reverse proxy config
# Handles both Socket.IO (/socket.io/) and native WebSocket (/ws/) correctly.
#
# To use on server:
#   sudo cp nginx.conf /etc/nginx/sites-available/riven
#   sudo ln -sf /etc/nginx/sites-available/riven /etc/nginx/sites-enabled/riven
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;   # replace with your domain: api.rivenapp.com dev.rivenapp.com

    # ── Socket.IO ─────────────────────────────────────────────────────────────
    # Must be a separate location so timeout can be set to unlimited.
    # Socket.IO uses /socket.io/ for both polling and WebSocket transport.
    location /socket.io/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Long timeouts — Socket.IO connections are persistent
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 75s;
    }

    # ── Native WebSocket (payment notifications) ───────────────────────────────
    location /ws/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 75s;
    }

    # ── Regular HTTP API ───────────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout  120s;
        proxy_connect_timeout 75s;
    }
}
